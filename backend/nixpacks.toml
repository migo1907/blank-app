[phases.setup]
# gfortran pulls in the full GCC runtime including libgomp.so.1
# required by lightgbm — without it lgbm_available stays false in /health
nixPkgs = ["python313", "gcc", "gfortran"]

[start]
# Find libgomp.so.1 in the Nix store at runtime and inject its path so
# LightGBM can load it — Nix doesn't add store paths to LD_LIBRARY_PATH
cmd = "export LD_LIBRARY_PATH=$(find /nix/store -name 'libgomp.so.1' -exec dirname {} \\; 2>/dev/null | head -1):$LD_LIBRARY_PATH && uvicorn main:app --host 0.0.0.0 --port $PORT"
