<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo (2).svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>Daman Financial - Professional Trading Platform | Stock Market Analysis</title>
    <meta name="title" content="Daman Financial - Professional Trading Platform" />
    <meta name="description" content="Advanced stock market analysis with real-time data, powerful screener, technical indicators, and comprehensive news. Professional trading tools for investors." />
    <meta name="keywords" content="stock market, trading platform, market analysis, stock screener, financial data, portfolio tracking" />
    <meta name="author" content="Daman Securities LLC" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Mobile Optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Daman Financial" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/logo (2).svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://daman.securities/" />
    <meta property="og:title" content="Daman Financial - Professional Trading Platform" />
    <meta property="og:description" content="Advanced stock market analysis with real-time data, powerful screener, and comprehensive tools." />
    <meta property="og:image" content="/logo (2).svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://daman.securities/" />
    <meta property="twitter:title" content="Daman Financial - Professional Trading Platform" />
    <meta property="twitter:description" content="Advanced stock market analysis with real-time data, powerful screener, and comprehensive tools." />
    <meta property="twitter:image" content="/logo (2).svg" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
