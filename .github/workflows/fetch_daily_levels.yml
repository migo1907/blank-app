name: Fetch Daily TradingView Levels

on:
  schedule:
    - cron: '50 7 * * 1-5'   # 07:50 UTC Mon-Fri
  workflow_dispatch:           # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: data
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch levels
        run: |
          python3 - <<'EOF'
          import json, time, requests
          from urllib.parse import quote
          from datetime import datetime, timezone

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

          def calc_pivots(ph, pl, pc, current, decimals):
              pivot = (ph + pl + pc) / 3
              r1 = 2 * pivot - pl
              r2 = pivot + (ph - pl)
              r3 = ph + 2 * (pivot - pl)
              s1 = 2 * pivot - ph
              s2 = pivot - (ph - pl)
              s3 = pl - 2 * (ph - pivot)
              return {
                  "current":             round(current, decimals),
                  "prev_high":           round(ph, decimals),
                  "prev_low":            round(pl, decimals),
                  "prev_close":          round(pc, decimals),
                  "pivot":               round(pivot, decimals),
                  "r1":                  round(r1, decimals),
                  "r2":                  round(r2, decimals),
                  "r3":                  round(r3, decimals),
                  "s1":                  round(s1, decimals),
                  "s2":                  round(s2, decimals),
                  "s3":                  round(s3, decimals),
                  "expected_range_low":  round(min(s2, current - (r1 - pivot)), decimals),
                  "expected_range_high": round(max(r2, current + (r1 - pivot)), decimals),
              }

          def _scanner_get(tv_symbol, fields, attempts=3):
              """Raw TradingView scanner call with retries. Returns dict or None."""
              url = (
                  f"https://scanner.tradingview.com/symbol"
                  f"?symbol={quote(tv_symbol)}&fields={fields}&no_404=1"
              )
              for i in range(attempts):
                  try:
                      resp = requests.get(url, timeout=10,
                                          headers={"User-Agent": UA, "Origin": "https://www.tradingview.com"})
                      if resp.status_code == 200:
                          return resp.json()
                      print(f"[action] TV scanner {tv_symbol}: HTTP {resp.status_code} (try {i+1}/{attempts})")
                  except Exception as e:
                      print(f"[action] TV scanner {tv_symbol}: {e} (try {i+1}/{attempts})")
                  time.sleep(1.5 * (i + 1))
              return None

          def fetch_gold(tv_symbol, decimals):
              """XAUUSD — IC Markets spot. 24h market, so 'close' is the live spot price."""
              d = _scanner_get(tv_symbol, "close,High.1,Low.1,close.1")
              if not d:
                  return None
              current, ph, pl, pc = d.get("close"), d.get("High.1"), d.get("Low.1"), d.get("close.1")
              if None in (current, ph, pl, pc):
                  print(f"[action] {tv_symbol}: missing fields — {d}")
                  return None
              lv = calc_pivots(float(ph), float(pl), float(pc), float(current), decimals)
              lv["price_source"] = "ICMARKETS spot"
              print(f"[action] {tv_symbol}: OK — IC spot {round(current,2)}")
              return lv

          def fetch_equity(tv_symbol, decimals):
              """SPY/QQQ — prefer premarket price; pivots from prior regular session H/L/C."""
              d = _scanner_get(tv_symbol, "close,premarket_close,High.1,Low.1,close.1")
              if not d:
                  return None
              pm = d.get("premarket_close")
              rc = d.get("close")
              current = pm if pm is not None else rc
              src     = "premarket" if pm is not None else "regular close"
              ph, pl, pc = d.get("High.1"), d.get("Low.1"), d.get("close.1")
              if None in (current, ph, pl, pc):
                  print(f"[action] {tv_symbol}: missing fields — {d}")
                  return None
              lv = calc_pivots(float(ph), float(pl), float(pc), float(current), decimals)
              lv["price_source"] = src
              print(f"[action] {tv_symbol}: OK — {src} {round(float(current),2)}")
              return lv

          # All prices from TradingView only — no Yahoo/GC fallback.
          #   XAUUSD → IC Markets spot   |   SPY/QQQ → premarket
          assets = {
              "XAUUSD": ("ICMARKETS:XAUUSD", 2, fetch_gold),
              "SPY":    ("AMEX:SPY",         2, fetch_equity),
              "QQQ":    ("NASDAQ:QQQ",       2, fetch_equity),
          }

          result = {"fetched_at": datetime.now(timezone.utc).isoformat(), "assets": {}}
          for name, (tv_sym, decimals, fn) in assets.items():
              levels = fn(tv_sym, decimals)
              if levels:
                  result["assets"][name] = levels
              else:
                  print(f"[action] {name}: TradingView fetch failed — no data this run")

          import os
          os.makedirs("data", exist_ok=True)
          with open("data/daily_levels.json", "w") as f:
              json.dump(result, f, indent=2)
          print("[action] Saved data/daily_levels.json")
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push levels
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_levels.json
          git diff --cached --quiet || git commit -m "chore: daily TradingView levels $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
