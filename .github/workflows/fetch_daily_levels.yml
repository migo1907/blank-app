name: Fetch Daily TradingView Levels

on:
  schedule:
    - cron: '50 7 * * 1-5'   # 07:50 UTC Mon-Fri
  workflow_dispatch:           # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: data
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch levels
        run: |
          python3 - <<'EOF'
          import json, requests
          from urllib.parse import quote
          from datetime import datetime, timezone

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

          def calc_pivots(ph, pl, pc, current, decimals):
              pivot = (ph + pl + pc) / 3
              r1 = 2 * pivot - pl
              r2 = pivot + (ph - pl)
              r3 = ph + 2 * (pivot - pl)
              s1 = 2 * pivot - ph
              s2 = pivot - (ph - pl)
              s3 = pl - 2 * (ph - pivot)
              return {
                  "current":             round(current, decimals),
                  "prev_high":           round(ph, decimals),
                  "prev_low":            round(pl, decimals),
                  "prev_close":          round(pc, decimals),
                  "pivot":               round(pivot, decimals),
                  "r1":                  round(r1, decimals),
                  "r2":                  round(r2, decimals),
                  "r3":                  round(r3, decimals),
                  "s1":                  round(s1, decimals),
                  "s2":                  round(s2, decimals),
                  "s3":                  round(s3, decimals),
                  "expected_range_low":  round(min(s2, current - (r1 - pivot)), decimals),
                  "expected_range_high": round(max(r2, current + (r1 - pivot)), decimals),
              }

          def fetch_tv_scanner(tv_symbol, decimals):
              """
              TradingView public scanner API — same data source as the widget.
              Returns current price + previous day H/L/C for pivot calculations.
              tv_symbol examples: 'ICMARKETS:XAUUSD', 'AMEX:SPY', 'NASDAQ:QQQ'
              """
              try:
                  # Fields: current close/high/low + previous day (suffix .1)
                  fields = "close,high,low,open,change,change_abs,High.1,Low.1,close.1"
                  url = (
                      f"https://scanner.tradingview.com/symbol"
                      f"?symbol={quote(tv_symbol)}&fields={fields}&no_404=1"
                  )
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA, "Origin": "https://www.tradingview.com"})
                  if resp.status_code != 200:
                      print(f"[action] TV scanner {tv_symbol}: HTTP {resp.status_code}")
                      return None
                  d = resp.json()
                  current = d.get("close")
                  ph      = d.get("High.1")
                  pl      = d.get("Low.1")
                  pc      = d.get("close.1")
                  if None in (current, ph, pl, pc):
                      print(f"[action] TV scanner {tv_symbol}: missing fields — {d}")
                      return None
                  print(f"[action] TV scanner {tv_symbol}: OK — price={round(current,2)}")
                  return calc_pivots(float(ph), float(pl), float(pc), float(current), decimals)
              except Exception as e:
                  print(f"[action] TV scanner {tv_symbol}: failed — {e}")
              return None

          def fetch_yahoo_direct(ticker, decimals):
              """Yahoo Finance v8 API — fallback if TradingView scanner fails."""
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{quote(ticker)}?range=5d&interval=1d"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA})
                  data = resp.json()
                  result = data.get("chart", {}).get("result")
                  if not result:
                      err = data.get("chart", {}).get("error", {})
                      print(f"[action] Yahoo {ticker}: {err.get('description', 'no data')}")
                      return None
                  quotes = result[0]["indicators"]["quote"][0]
                  closes = [c for c in quotes["close"] if c is not None]
                  highs  = [h for h in quotes["high"]  if h is not None]
                  lows   = [l for l in quotes["low"]   if l is not None]
                  if len(closes) >= 2:
                      print(f"[action] Yahoo {ticker}: OK — price={round(closes[-1],2)}")
                      return calc_pivots(highs[-2], lows[-2], closes[-2], closes[-1], decimals)
                  print(f"[action] Yahoo {ticker}: insufficient data ({len(closes)} rows)")
              except Exception as e:
                  print(f"[action] Yahoo {ticker}: failed — {e}")
              return None

          # Source priority per asset:
          #   1. TradingView scanner API (true ICMARKETS/AMEX/NASDAQ prices)
          #   2. Yahoo Finance fallback
          assets = {
              "XAUUSD": {"tv": ("ICMARKETS:XAUUSD", 2), "yf": ["XAU=X", "GC=F"]},
              "SPY":    {"tv": ("AMEX:SPY",          2), "yf": ["SPY"]},
              "QQQ":    {"tv": ("NASDAQ:QQQ",         2), "yf": ["QQQ"]},
          }

          result = {"fetched_at": datetime.now(timezone.utc).isoformat(), "assets": {}}
          for name, cfg in assets.items():
              tv_sym, decimals = cfg["tv"]
              levels = fetch_tv_scanner(tv_sym, decimals)
              if not levels:
                  for yf_ticker in cfg["yf"]:
                      levels = fetch_yahoo_direct(yf_ticker, decimals)
                      if levels:
                          break
              if levels:
                  result["assets"][name] = levels
              else:
                  print(f"[action] {name}: ALL sources failed")

          import os
          os.makedirs("data", exist_ok=True)
          with open("data/daily_levels.json", "w") as f:
              json.dump(result, f, indent=2)
          print("[action] Saved data/daily_levels.json")
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push levels
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_levels.json
          git diff --cached --quiet || git commit -m "chore: daily TradingView levels $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
