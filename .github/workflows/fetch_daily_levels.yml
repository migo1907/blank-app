name: Fetch Daily TradingView Levels

on:
  schedule:
    - cron: '50 7 * * 1-5'   # 07:50 UTC Mon-Fri
  workflow_dispatch:           # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/hopeful-pasteur-VVHCl
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch levels
        run: |
          python3 - <<'EOF'
          import json, requests, time
          from urllib.parse import quote
          from datetime import datetime, timezone

          UA      = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          HEADERS = {"User-Agent": UA}

          def calc_pivots(ph, pl, pc, current, decimals):
              pivot = (ph + pl + pc) / 3
              r1 = 2 * pivot - pl
              r2 = pivot + (ph - pl)
              r3 = ph + 2 * (pivot - pl)
              s1 = 2 * pivot - ph
              s2 = pivot - (ph - pl)
              s3 = pl - 2 * (ph - pivot)
              return {
                  "current":             round(current, decimals),
                  "prev_high":           round(ph, decimals),
                  "prev_low":            round(pl, decimals),
                  "prev_close":          round(pc, decimals),
                  "pivot":               round(pivot, decimals),
                  "r1":                  round(r1, decimals),
                  "r2":                  round(r2, decimals),
                  "r3":                  round(r3, decimals),
                  "s1":                  round(s1, decimals),
                  "s2":                  round(s2, decimals),
                  "s3":                  round(s3, decimals),
                  "expected_range_low":  round(min(s2, current - (r1 - pivot)), decimals),
                  "expected_range_high": round(max(r2, current + (r1 - pivot)), decimals),
              }

          # ── Source 1: metals.live (free, no API key, spot gold) ─────────────────
          def fetch_metals_live():
              try:
                  resp = requests.get("https://api.metals.live/v1/spot", timeout=10, headers=HEADERS)
                  data = resp.json()
                  # returns list: [{"metal":"gold","price":4470.xx}, ...]
                  for item in data:
                      if item.get("metal", "").lower() == "gold":
                          price = float(item["price"])
                          print(f"[action] metals.live: gold spot = {price}")
                          return price
              except Exception as e:
                  print(f"[action] metals.live failed: {e}")
              return None

          # ── Source 2: TVC:GOLD via TradingView scanner (proven accurate) ────────
          def fetch_tvc_gold():
              try:
                  url = "https://scanner.tradingview.com/symbol?symbol=TVC%3AGOLD&fields=close,high,low,open&no_404=1"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA, "Origin": "https://www.tradingview.com"})
                  d = resp.json()
                  price = d.get("close")
                  if price:
                      print(f"[action] TVC:GOLD scanner: close = {round(price,2)}")
                      return float(price)
              except Exception as e:
                  print(f"[action] TVC:GOLD failed: {e}")
              return None

          # ── Source 3: exchangerate.host (free, XAU/USD) ──────────────────────────
          def fetch_exchangerate_host():
              try:
                  resp = requests.get("https://api.exchangerate.host/latest?base=XAU&symbols=USD&places=2", timeout=10, headers=HEADERS)
                  data = resp.json()
                  usd = data.get("rates", {}).get("USD")
                  if usd:
                      print(f"[action] exchangerate.host: XAU/USD = {usd}")
                      return float(usd)
              except Exception as e:
                  print(f"[action] exchangerate.host failed: {e}")
              return None

          # ── Source 4: frankfurter.app / open.er-api (XAU if supported) ───────────
          def fetch_open_er():
              try:
                  resp = requests.get("https://open.er-api.com/v6/latest/XAU", timeout=10, headers=HEADERS)
                  data = resp.json()
                  usd = data.get("rates", {}).get("USD")
                  if usd:
                      print(f"[action] open.er-api: XAU/USD = {usd}")
                      return float(usd)
              except Exception as e:
                  print(f"[action] open.er-api failed: {e}")
              return None

          # ── Source 5: GC=F Yahoo for prev day H/L/C (proven working) ───────────
          def fetch_gcf_prev_day():
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{quote('GC=F')}?range=5d&interval=1d"
                  resp = requests.get(url, timeout=10, headers=HEADERS)
                  data = resp.json()
                  result = data.get("chart", {}).get("result")
                  if not result:
                      return None
                  quotes = result[0]["indicators"]["quote"][0]
                  closes = [c for c in quotes["close"] if c is not None]
                  highs  = [h for h in quotes["high"]  if h is not None]
                  lows   = [l for l in quotes["low"]   if l is not None]
                  if len(closes) >= 2:
                      print(f"[action] GC=F prev day: H={round(highs[-2],2)} L={round(lows[-2],2)} C={round(closes[-2],2)}")
                      return highs[-2], lows[-2], closes[-2]
              except Exception as e:
                  print(f"[action] GC=F prev day failed: {e}")
              return None

          def fetch_yahoo_direct(ticker, decimals):
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{quote(ticker)}?range=5d&interval=1d"
                  resp = requests.get(url, timeout=10, headers=HEADERS)
                  data = resp.json()
                  result = data.get("chart", {}).get("result")
                  if not result:
                      print(f"[action] Yahoo {ticker}: {data.get('chart',{}).get('error',{}).get('description','no data')}")
                      return None
                  quotes = result[0]["indicators"]["quote"][0]
                  closes = [c for c in quotes["close"] if c is not None]
                  highs  = [h for h in quotes["high"]  if h is not None]
                  lows   = [l for l in quotes["low"]   if l is not None]
                  if len(closes) >= 2:
                      print(f"[action] Yahoo {ticker}: close={round(closes[-1],2)} prevH={round(highs[-2],2)} prevL={round(lows[-2],2)} prevC={round(closes[-2],2)}")
                      return calc_pivots(highs[-2], lows[-2], closes[-2], closes[-1], decimals)
              except Exception as e:
                  print(f"[action] Yahoo {ticker}: failed — {e}")
              return None

          # ════════════════════════════════════════════════════════════════
          # XAUUSD: best spot price + GC=F prev day H/L/C for pivots
          # ════════════════════════════════════════════════════════════════
          print("=== XAUUSD SPOT PRICE SOURCES ===")
          spot = fetch_metals_live()
          if not spot: spot = fetch_tvc_gold()
          if not spot: spot = fetch_exchangerate_host()
          if not spot: spot = fetch_open_er()
          print(f"[action] Best spot price: {spot}")

          prev = fetch_gcf_prev_day()
          xauusd = None
          if spot and prev:
              ph, pl, pc = prev
              xauusd = calc_pivots(ph, pl, pc, spot, 2)
              print(f"[action] XAUUSD: spot={spot} prevH={ph} prevL={pl} prevC={pc}")
          elif not spot:
              print("[action] XAUUSD: no spot price found")
          elif not prev:
              print("[action] XAUUSD: no prev day data found")

          # SPY / QQQ via Yahoo (working fine)
          spy = fetch_yahoo_direct("SPY", 2)
          qqq = fetch_yahoo_direct("QQQ", 2)

          result = {"fetched_at": datetime.now(timezone.utc).isoformat(), "assets": {}}
          if xauusd: result["assets"]["XAUUSD"] = xauusd
          if spy:    result["assets"]["SPY"]    = spy
          if qqq:    result["assets"]["QQQ"]    = qqq

          import os
          os.makedirs("data", exist_ok=True)
          with open("data/daily_levels.json", "w") as f:
              json.dump(result, f, indent=2)
          print("[action] Saved data/daily_levels.json")
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push levels
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_levels.json
          git diff --cached --quiet || git commit -m "chore: daily TradingView levels $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
