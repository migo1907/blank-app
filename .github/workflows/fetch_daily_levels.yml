name: Fetch Daily TradingView Levels

on:
  schedule:
    - cron: '50 7 * * 1-5'   # 07:50 UTC Mon-Fri
  workflow_dispatch:           # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/hopeful-pasteur-VVHCl
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch levels
        run: |
          python3 - <<'EOF'
          import json, requests
          from datetime import datetime, timezone

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

          def calc_pivots(ph, pl, pc, current, decimals):
              pivot = (ph + pl + pc) / 3
              r1 = 2 * pivot - pl
              r2 = pivot + (ph - pl)
              r3 = ph + 2 * (pivot - pl)
              s1 = 2 * pivot - ph
              s2 = pivot - (ph - pl)
              s3 = pl - 2 * (ph - pivot)
              return {
                  "current":             round(current, decimals),
                  "prev_high":           round(ph, decimals),
                  "prev_low":            round(pl, decimals),
                  "prev_close":          round(pc, decimals),
                  "pivot":               round(pivot, decimals),
                  "r1":                  round(r1, decimals),
                  "r2":                  round(r2, decimals),
                  "r3":                  round(r3, decimals),
                  "s1":                  round(s1, decimals),
                  "s2":                  round(s2, decimals),
                  "s3":                  round(s3, decimals),
                  "expected_range_low":  round(min(s2, current - (r1 - pivot)), decimals),
                  "expected_range_high": round(max(r2, current + (r1 - pivot)), decimals),
              }

          def fetch_yahoo_direct(ticker, decimals):
              """Direct Yahoo Finance v8 chart API - no library needed."""
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{ticker}?range=5d&interval=1d"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA})
                  data = resp.json()
                  quotes = data["chart"]["result"][0]["indicators"]["quote"][0]
                  closes = [c for c in quotes["close"] if c is not None]
                  highs  = [h for h in quotes["high"]  if h is not None]
                  lows   = [l for l in quotes["low"]   if l is not None]
                  if len(closes) >= 2:
                      print(f"[action] {ticker}: Yahoo direct OK - close={round(closes[-1],2)}")
                      return calc_pivots(highs[-2], lows[-2], closes[-2], closes[-1], decimals)
                  print(f"[action] {ticker}: Yahoo direct insufficient data")
              except Exception as e:
                  print(f"[action] {ticker}: Yahoo direct failed - {e}")
              return None

          def fetch_yf_lib(ticker, decimals):
              try:
                  import yfinance as yf
                  hist = yf.Ticker(ticker).history(period="5d", interval="1d", auto_adjust=True)
                  if not hist.empty and len(hist) >= 2:
                      prev, today = hist.iloc[-2], hist.iloc[-1]
                      print(f"[action] {ticker}: yfinance OK")
                      return calc_pivots(float(prev["High"]), float(prev["Low"]), float(prev["Close"]), float(today["Close"]), decimals)
              except Exception as e:
                  print(f"[action] {ticker}: yfinance failed - {e}")
              return None

          def fetch_tv(symbol, exchange, decimals):
              try:
                  from tvdatafeed import TvDatafeed, Interval
                  tv = TvDatafeed()
                  df = tv.get_hist(symbol, exchange, interval=Interval.in_daily, n_bars=5)
                  if df is not None and len(df) >= 2:
                      prev, today = df.iloc[-2], df.iloc[-1]
                      print(f"[action] {symbol}/{exchange}: TradingView OK")
                      return calc_pivots(float(prev["high"]), float(prev["low"]), float(prev["close"]), float(today["close"]), decimals)
              except Exception as e:
                  print(f"[action] {symbol}/{exchange}: tvdatafeed failed - {e}")
              return None

          assets = {
              "XAUUSD": {"tv": ("XAUUSD", "ICMARKETS"), "yahoo": "XAUUSD=X", "decimals": 2},
              "SPY":    {"tv": ("SPY",    "AMEX"),      "yahoo": "SPY",      "decimals": 2},
              "QQQ":    {"tv": ("QQQ",    "NASDAQ"),    "yahoo": "QQQ",      "decimals": 2},
          }

          result = {"fetched_at": datetime.now(timezone.utc).isoformat(), "assets": {}}
          for name, cfg in assets.items():
              sym, exchange = cfg["tv"]
              decimals = cfg["decimals"]
              levels = fetch_tv(sym, exchange, decimals)
              if not levels:
                  levels = fetch_yahoo_direct(cfg["yahoo"], decimals)
              if not levels:
                  levels = fetch_yf_lib(cfg["yahoo"], decimals)
              if levels:
                  result["assets"][name] = levels
              else:
                  print(f"[action] {name}: ALL sources failed")

          import os
          os.makedirs("data", exist_ok=True)
          with open("data/daily_levels.json", "w") as f:
              json.dump(result, f, indent=2)
          print("[action] Saved data/daily_levels.json")
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push levels
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_levels.json
          git diff --cached --quiet || git commit -m "chore: daily TradingView levels $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
