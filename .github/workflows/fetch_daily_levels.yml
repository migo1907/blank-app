name: Fetch Daily TradingView Levels

on:
  schedule:
    - cron: '50 7 * * 1-5'    # 07:50 UTC Mon-Fri — 70 min before the 09:00 UTC brief,
                              # inside US premarket (08:00–13:30 UTC) so SPY/QQQ premarket is live
  workflow_dispatch:           # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: data
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch levels
        run: |
          python3 - <<'EOF'
          import json, time, requests
          from urllib.parse import quote
          from datetime import datetime, timezone

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

          def calc_pivots(ph, pl, pc, current, decimals):
              pivot = (ph + pl + pc) / 3
              r1 = 2 * pivot - pl
              r2 = pivot + (ph - pl)
              r3 = ph + 2 * (pivot - pl)
              s1 = 2 * pivot - ph
              s2 = pivot - (ph - pl)
              s3 = pl - 2 * (ph - pivot)
              return {
                  "current":             round(current, decimals),
                  "prev_high":           round(ph, decimals),
                  "prev_low":            round(pl, decimals),
                  "prev_close":          round(pc, decimals),
                  "pivot":               round(pivot, decimals),
                  "r1":                  round(r1, decimals),
                  "r2":                  round(r2, decimals),
                  "r3":                  round(r3, decimals),
                  "s1":                  round(s1, decimals),
                  "s2":                  round(s2, decimals),
                  "s3":                  round(s3, decimals),
                  "expected_range_low":  round(min(s2, current - (r1 - pivot)), decimals),
                  "expected_range_high": round(max(r2, current + (r1 - pivot)), decimals),
              }

          def _scanner_get(tv_symbol, fields, attempts=3):
              """Raw TradingView scanner call with retries. Returns dict or None."""
              url = (
                  f"https://scanner.tradingview.com/symbol"
                  f"?symbol={quote(tv_symbol)}&fields={fields}&no_404=1"
              )
              for i in range(attempts):
                  try:
                      resp = requests.get(url, timeout=10,
                                          headers={"User-Agent": UA, "Origin": "https://www.tradingview.com"})
                      if resp.status_code == 200:
                          return resp.json()
                      print(f"[action] TV scanner {tv_symbol}: HTTP {resp.status_code} (try {i+1}/{attempts})")
                  except Exception as e:
                      print(f"[action] TV scanner {tv_symbol}: {e} (try {i+1}/{attempts})")
                  time.sleep(1.5 * (i + 1))
              return None

          def tv_price(tv_symbols, price_fields):
              """
              Live price from TradingView scanner. Tries each symbol, then each field
              in priority order. Returns (price, 'SYMBOL field') or (None, None).
              """
              for sym in tv_symbols:
                  d = _scanner_get(sym, ",".join(price_fields))
                  if not d:
                      continue
                  for f in price_fields:
                      v = d.get(f)
                      if v is not None:
                          print(f"[action] TV price {sym}: {f}={round(float(v),2)}")
                          return float(v), f"{sym} {f}"
                  print(f"[action] TV price {sym}: no usable field in {price_fields} — {d}")
              return None, None

          def _yahoo_one(ticker):
              """Previous COMPLETED daily H/L/C from one Yahoo ticker, or None."""
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{quote(ticker)}?range=7d&interval=1d"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA})
                  res = resp.json().get("chart", {}).get("result")
                  if not res:
                      print(f"[action] Yahoo {ticker}: no chart result")
                      return None
                  r0 = res[0]
                  ts = r0.get("timestamp", []) or []
                  q  = r0["indicators"]["quote"][0]
                  today = datetime.now(timezone.utc).date()
                  bars = []
                  for i, t in enumerate(ts):
                      h, l, c = q["high"][i], q["low"][i], q["close"][i]
                      if None in (h, l, c):
                          continue
                      d = datetime.fromtimestamp(t, timezone.utc).date()
                      if d >= today:   # skip today's partial bar
                          continue
                      bars.append((h, l, c))
                  if not bars:
                      print(f"[action] Yahoo {ticker}: no completed prior bar")
                      return None
                  h, l, c = bars[-1]
                  print(f"[action] Yahoo {ticker}: prev H/L/C {round(h,2)}/{round(l,2)}/{round(c,2)}")
                  return float(h), float(l), float(c)
              except Exception as e:
                  print(f"[action] Yahoo {ticker}: {e}")
                  return None

          def yahoo_prevday(tickers, decimals):
              """Try each Yahoo ticker (spot first) for prior-day H/L/C."""
              for tk in tickers:
                  prev = _yahoo_one(tk)
                  if prev is not None:
                      return prev
              return None

          def build_levels(tv_symbols, price_fields, yahoo_tickers, decimals):
              """Live price from TradingView + prev-day H/L/C from Yahoo spot → pivots."""
              price, psrc = tv_price(tv_symbols, price_fields)
              if price is None:
                  return None
              prev = yahoo_prevday(yahoo_tickers, decimals)
              if prev is None:
                  return None
              ph, pl, pc = prev
              lv = calc_pivots(ph, pl, pc, price, decimals)
              lv["price_source"] = psrc
              return lv

          # Price = TradingView (gold spot symbol chain; SPY/QQQ premarket).
          # Pivots = Yahoo previous-day H/L/C using SPOT tickers (XAU=X, not GC futures).
          assets = {
              "XAUUSD": {
                  "tv": ["TVC:GOLD", "OANDA:XAUUSD", "FX_IDC:XAUUSD", "FOREXCOM:XAUUSD", "ICMARKETS:XAUUSD"],
                  "fields": ["close"],
                  "yahoo": ["XAUUSD=X", "XAU=X", "GC=F"], "dec": 2,
              },
              "SPY": {
                  "tv": ["AMEX:SPY"],
                  "fields": ["premarket_close", "close"],
                  "yahoo": ["SPY"], "dec": 2,
              },
              "QQQ": {
                  "tv": ["NASDAQ:QQQ"],
                  "fields": ["premarket_close", "close"],
                  "yahoo": ["QQQ"], "dec": 2,
              },
          }

          result = {"fetched_at": datetime.now(timezone.utc).isoformat(), "assets": {}}
          for name, cfg in assets.items():
              levels = build_levels(cfg["tv"], cfg["fields"], cfg["yahoo"], cfg["dec"])
              if levels:
                  result["assets"][name] = levels
                  print(f"[action] {name}: OK — price={levels['current']} ({levels['price_source']})")
              else:
                  print(f"[action] {name}: fetch failed — no data this run")

          import os
          os.makedirs("data", exist_ok=True)
          with open("data/daily_levels.json", "w") as f:
              json.dump(result, f, indent=2)
          print("[action] Saved data/daily_levels.json")
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push levels
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_levels.json
          git diff --cached --quiet && { echo "No changes to commit."; exit 0; }
          git commit -m "chore: daily TradingView levels $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Railway writes to the data branch concurrently — rebase + retry on rejection.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on latest data branch."
            git pull --rebase --autostash origin data || true
            sleep $((attempt * 2))
          done
          echo "ERROR: could not push daily_levels.json after 5 attempts."
          exit 1
