name: Fetch Daily TradingView Levels

on:
  schedule:
    - cron: '50 7 * * 1-5'   # 07:50 UTC Mon-Fri
  workflow_dispatch:           # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/hopeful-pasteur-VVHCl
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch levels
        run: |
          python3 - <<'EOF'
          import json, requests
          from urllib.parse import quote
          from datetime import datetime, timezone

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

          def calc_pivots(ph, pl, pc, current, decimals):
              pivot = (ph + pl + pc) / 3
              r1 = 2 * pivot - pl
              r2 = pivot + (ph - pl)
              r3 = ph + 2 * (pivot - pl)
              s1 = 2 * pivot - ph
              s2 = pivot - (ph - pl)
              s3 = pl - 2 * (ph - pivot)
              return {
                  "current":             round(current, decimals),
                  "prev_high":           round(ph, decimals),
                  "prev_low":            round(pl, decimals),
                  "prev_close":          round(pc, decimals),
                  "pivot":               round(pivot, decimals),
                  "r1":                  round(r1, decimals),
                  "r2":                  round(r2, decimals),
                  "r3":                  round(r3, decimals),
                  "s1":                  round(s1, decimals),
                  "s2":                  round(s2, decimals),
                  "s3":                  round(s3, decimals),
                  "expected_range_low":  round(min(s2, current - (r1 - pivot)), decimals),
                  "expected_range_high": round(max(r2, current + (r1 - pivot)), decimals),
              }

          def fetch_tvc_gold_spot():
              """TradingView scanner — TVC:GOLD spot price (within ~$1-3 of ICMARKETS)."""
              try:
                  url = "https://scanner.tradingview.com/symbol?symbol=TVC%3AGOLD&fields=close,high,low,open&no_404=1"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA, "Origin": "https://www.tradingview.com"})
                  if resp.status_code != 200:
                      print(f"[action] TVC:GOLD scanner: HTTP {resp.status_code}")
                      return None
                  price = resp.json().get("close")
                  if price is None:
                      print("[action] TVC:GOLD scanner: no close field")
                      return None
                  print(f"[action] TVC:GOLD scanner: close = {price}")
                  return float(price)
              except Exception as e:
                  print(f"[action] TVC:GOLD scanner: failed — {e}")
              return None

          def fetch_oanda_gold_spot():
              """TradingView scanner — OANDA:XAUUSD fallback spot price."""
              try:
                  url = "https://scanner.tradingview.com/symbol?symbol=OANDA%3AXAUUSD&fields=close&no_404=1"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA, "Origin": "https://www.tradingview.com"})
                  if resp.status_code != 200:
                      return None
                  price = resp.json().get("close")
                  if price is None:
                      return None
                  print(f"[action] OANDA:XAUUSD scanner: close = {price}")
                  return float(price)
              except Exception as e:
                  print(f"[action] OANDA:XAUUSD scanner: failed — {e}")
              return None

          def fetch_gcf_prev_day():
              """GC=F (gold futures) via Yahoo Finance — used only for prev day H/L/C."""
              try:
                  url = "https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF?range=5d&interval=1d"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA})
                  data = resp.json()
                  result = data.get("chart", {}).get("result")
                  if not result:
                      print("[action] GC=F: no data")
                      return None
                  q = result[0]["indicators"]["quote"][0]
                  highs  = [h for h in q["high"]  if h is not None]
                  lows   = [l for l in q["low"]   if l is not None]
                  closes = [c for c in q["close"] if c is not None]
                  if len(closes) >= 2:
                      print(f"[action] GC=F prev day: H={round(highs[-2],2)} L={round(lows[-2],2)} C={round(closes[-2],2)}")
                      return highs[-2], lows[-2], closes[-2]
                  print(f"[action] GC=F: insufficient data ({len(closes)} rows)")
              except Exception as e:
                  print(f"[action] GC=F: failed — {e}")
              return None

          def fetch_yahoo_direct(ticker, decimals):
              """Yahoo Finance v8 API — for SPY and QQQ."""
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{quote(ticker)}?range=5d&interval=1d"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA})
                  data = resp.json()
                  result = data.get("chart", {}).get("result")
                  if not result:
                      err = data.get("chart", {}).get("error", {})
                      print(f"[action] Yahoo {ticker}: {err.get('description', 'no data')}")
                      return None
                  quotes = result[0]["indicators"]["quote"][0]
                  closes = [c for c in quotes["close"] if c is not None]
                  highs  = [h for h in quotes["high"]  if h is not None]
                  lows   = [l for l in quotes["low"]   if l is not None]
                  if len(closes) >= 2:
                      print(f"[action] Yahoo {ticker}: close={round(closes[-1],2)} prevH={round(highs[-2],2)} prevL={round(lows[-2],2)} prevC={round(closes[-2],2)}")
                      return calc_pivots(highs[-2], lows[-2], closes[-2], closes[-1], decimals)
                  print(f"[action] Yahoo {ticker}: insufficient data ({len(closes)} rows)")
              except Exception as e:
                  print(f"[action] Yahoo {ticker}: failed — {e}")
              return None

          # ── XAUUSD: spot price from TVC:GOLD, prev H/L/C from GC=F ──────────────
          print("=== XAUUSD SPOT PRICE SOURCES ===")
          spot = fetch_tvc_gold_spot()
          if spot is None:
              spot = fetch_oanda_gold_spot()
          print(f"[action] Best spot price: {spot}")

          prev = fetch_gcf_prev_day()

          result = {"fetched_at": datetime.now(timezone.utc).isoformat(), "assets": {}}

          if spot and prev:
              ph, pl, pc = prev
              print(f"[action] XAUUSD: spot={spot} prevH={ph} prevL={pl} prevC={pc}")
              result["assets"]["XAUUSD"] = calc_pivots(ph, pl, pc, spot, 2)
          else:
              print("[action] XAUUSD: ALL sources failed")

          # ── SPY / QQQ via Yahoo Finance ───────────────────────────────────────────
          spy = fetch_yahoo_direct("SPY", 2)
          if spy:
              result["assets"]["SPY"] = spy
          else:
              print("[action] SPY: ALL sources failed")

          qqq = fetch_yahoo_direct("QQQ", 2)
          if qqq:
              result["assets"]["QQQ"] = qqq
          else:
              print("[action] QQQ: ALL sources failed")

          import os
          os.makedirs("data", exist_ok=True)
          with open("data/daily_levels.json", "w") as f:
              json.dump(result, f, indent=2)
          print("[action] Saved data/daily_levels.json")
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push levels
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_levels.json
          git diff --cached --quiet || git commit -m "chore: daily TradingView levels $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
