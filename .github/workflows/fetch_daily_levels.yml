name: Fetch Daily TradingView Levels

on:
  schedule:
    - cron: '50 7 * * 1-5'   # 07:50 UTC Mon-Fri
  workflow_dispatch:           # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/hopeful-pasteur-VVHCl
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch levels
        run: |
          python3 - <<'EOF'
          import json, requests
          from urllib.parse import quote
          from datetime import datetime, timezone

          UA      = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          HEADERS = {"User-Agent": UA, "Origin": "https://www.tradingview.com", "Referer": "https://www.tradingview.com/"}

          def calc_pivots(ph, pl, pc, current, decimals):
              pivot = (ph + pl + pc) / 3
              r1 = 2 * pivot - pl
              r2 = pivot + (ph - pl)
              r3 = ph + 2 * (pivot - pl)
              s1 = 2 * pivot - ph
              s2 = pivot - (ph - pl)
              s3 = pl - 2 * (ph - pivot)
              return {
                  "current":             round(current, decimals),
                  "prev_high":           round(ph, decimals),
                  "prev_low":            round(pl, decimals),
                  "prev_close":          round(pc, decimals),
                  "pivot":               round(pivot, decimals),
                  "r1":                  round(r1, decimals),
                  "r2":                  round(r2, decimals),
                  "r3":                  round(r3, decimals),
                  "s1":                  round(s1, decimals),
                  "s2":                  round(s2, decimals),
                  "s3":                  round(s3, decimals),
                  "expected_range_low":  round(min(s2, current - (r1 - pivot)), decimals),
                  "expected_range_high": round(max(r2, current + (r1 - pivot)), decimals),
              }

          def fetch_tv_post(tv_symbol, decimals):
              """TradingView scanner POST API — returns current + previous day OHLC."""
              try:
                  columns = ["close", "high", "low", "open", "High.1", "Low.1", "close.1", "high.1", "low.1"]
                  body = {"symbols": {"tickers": [tv_symbol]}, "columns": columns}
                  resp = requests.post(
                      "https://scanner.tradingview.com/global/scan",
                      json=body, timeout=10, headers=HEADERS
                  )
                  if resp.status_code != 200:
                      print(f"[action] TV POST {tv_symbol}: HTTP {resp.status_code}")
                      return None
                  rows = resp.json().get("data", [])
                  if not rows:
                      print(f"[action] TV POST {tv_symbol}: no data returned")
                      return None
                  d = dict(zip(columns, rows[0]["d"]))
                  print(f"[action] TV POST {tv_symbol}: {d}")
                  current = d.get("close")
                  # try both capitalizations of previous day fields
                  ph = d.get("High.1") or d.get("high.1")
                  pl = d.get("Low.1")  or d.get("low.1")
                  pc = d.get("close.1")
                  if None in (current, ph, pl, pc):
                      print(f"[action] TV POST {tv_symbol}: missing prev day fields")
                      return None
                  print(f"[action] TV POST {tv_symbol}: OK price={round(current,2)} prevH={round(ph,2)} prevL={round(pl,2)} prevC={round(pc,2)}")
                  return calc_pivots(float(ph), float(pl), float(pc), float(current), decimals)
              except Exception as e:
                  print(f"[action] TV POST {tv_symbol}: failed — {e}")
              return None

          def fetch_tv_get(tv_symbol, decimals):
              """TradingView scanner GET API — current price only."""
              try:
                  fields = "close,high,low,open"
                  url = f"https://scanner.tradingview.com/symbol?symbol={quote(tv_symbol)}&fields={fields}&no_404=1"
                  resp = requests.get(url, timeout=10, headers=HEADERS)
                  if resp.status_code != 200:
                      return None
                  d = resp.json()
                  return d.get("close")
              except Exception as e:
                  print(f"[action] TV GET {tv_symbol}: failed — {e}")
              return None

          def fetch_yahoo_direct(ticker, decimals):
              """Yahoo Finance v8 API fallback."""
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{quote(ticker)}?range=5d&interval=1d"
                  resp = requests.get(url, timeout=10, headers={"User-Agent": UA})
                  data = resp.json()
                  result = data.get("chart", {}).get("result")
                  if not result:
                      print(f"[action] Yahoo {ticker}: {data.get('chart',{}).get('error',{}).get('description','no data')}")
                      return None
                  quotes = result[0]["indicators"]["quote"][0]
                  closes = [c for c in quotes["close"] if c is not None]
                  highs  = [h for h in quotes["high"]  if h is not None]
                  lows   = [l for l in quotes["low"]   if l is not None]
                  if len(closes) >= 2:
                      print(f"[action] Yahoo {ticker}: close={round(closes[-1],2)} prevH={round(highs[-2],2)} prevL={round(lows[-2],2)} prevC={round(closes[-2],2)}")
                      return calc_pivots(highs[-2], lows[-2], closes[-2], closes[-1], decimals)
              except Exception as e:
                  print(f"[action] Yahoo {ticker}: failed — {e}")
              return None

          # ── XAUUSD: try POST API for all spot gold symbols ──────────────────
          gold_symbols = ["TVC:GOLD", "OANDA:XAUUSD", "FX:XAUUSD", "ICMARKETS:XAUUSD", "CMCMARKETS:GOLD"]
          xauusd = None
          for sym in gold_symbols:
              xauusd = fetch_tv_post(sym, 2)
              if xauusd:
                  print(f"[action] XAUUSD: using {sym}")
                  break

          # If POST gives current price but no prev day, try to combine
          if not xauusd:
              # Get current spot price from TVC:GOLD
              spot_price = fetch_tv_get("TVC:GOLD", 2)
              # Get prev day H/L/C from XAU=X then GC=F
              for yf_ticker in ["XAU=X", "GC=F"]:
                  levels = fetch_yahoo_direct(yf_ticker, 2)
                  if levels:
                      if spot_price:
                          levels["current"] = round(spot_price, 2)
                          # recalculate range with real spot price
                          r1 = levels["r1"]
                          pivot = levels["pivot"]
                          levels["expected_range_low"]  = round(min(levels["s2"], spot_price - (r1 - pivot)), 2)
                          levels["expected_range_high"] = round(max(levels["r2"], spot_price + (r1 - pivot)), 2)
                      xauusd = levels
                      print(f"[action] XAUUSD: combined TVC:GOLD price + {yf_ticker} prev day levels")
                      break

          # ── SPY and QQQ ─────────────────────────────────────────────────────
          spy = (fetch_tv_post("AMEX:SPY", 2) or fetch_yahoo_direct("SPY", 2))
          qqq = (fetch_tv_post("NASDAQ:QQQ", 2) or fetch_yahoo_direct("QQQ", 2))

          result = {"fetched_at": datetime.now(timezone.utc).isoformat(), "assets": {}}
          if xauusd: result["assets"]["XAUUSD"] = xauusd
          if spy:    result["assets"]["SPY"]    = spy
          if qqq:    result["assets"]["QQQ"]    = qqq

          import os
          os.makedirs("data", exist_ok=True)
          with open("data/daily_levels.json", "w") as f:
              json.dump(result, f, indent=2)
          print("[action] Saved data/daily_levels.json")
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push levels
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_levels.json
          git diff --cached --quiet || git commit -m "chore: daily TradingView levels $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
