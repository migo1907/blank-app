name: Deploy Preview (GitHub Pages)

# Builds the DAMAN platform and publishes a preview to GitHub Pages.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# Runs in demo mode unless you add VITE_* repo variables (see docs/DEPLOY.md).

on:
  push:
    branches: ["claude/sweet-hopper-6qqg4c"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daman-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: daman-platform/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /blank-app/
          # Optional: surface live data on the preview by adding these as repo
          # variables (Settings → Secrets and variables → Actions → Variables).
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: daman-platform/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
