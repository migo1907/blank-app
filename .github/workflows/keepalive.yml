name: Keep Railway Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://blank-app-production-a8bd.up.railway.app/health
